name: desktop-release

on:
  workflow_dispatch:

jobs:
  package-windows:
    runs-on: windows-latest
    env:
      PROMO_APP_WEB_DIR: ./promo_APP_Web
      VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout web client
        uses: actions/checkout@v4
        with:
          repository: caio-3htty/promo_APP_Web
          path: promo_APP_Web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            promo_APP_Web/package-lock.json

      - name: Validate required env
        shell: bash
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "Missing VITE_SUPABASE_URL or VITE_SUPABASE_PUBLISHABLE_KEY"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix ./promo_APP_Web ci

      - name: Lint desktop shell
        run: npm run lint

      - name: Build desktop web shell
        run: npm run build

      - name: Prepare embedded web bundle
        run: npm run desktop:prepare:web

      - name: Build desktop artifact
        run: npm run desktop:build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: promo_APP_Windows-installer
          path: release/*.exe
          if-no-files-found: error
